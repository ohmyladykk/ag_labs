<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG Labs - CEO Dashboard (ULTRA)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍎 Antigravity Labs 🐾</h1>
            <div class="status-badge">ULTRA MODE ENABLED</div>
        </header>

        <main>
            <section class="card video-section">
                <h3>🎥 CEO Working Hard...</h3>
                <div class="video-container">
                    <video autoplay loop muted playsinline class="main-video">
                        <source src="panda_ceo.mp4.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <p class="video-caption">AI開発に勤しむCEO（のイメージ）</p>
            </section>

            <section class="card auth-section">
                <h2>🔑 メンバー限定ログイン</h2>
                <button class="btn-google">G | Googleアカウントでログイン</button>
            </section>

            <section class="card payment-section">
                <h3>💎 プレミアムプラン</h3>
                <div class="price">¥980 <small>/ 月</small></div>
                <div class="pay-buttons">
                    <button class="btn-stripe">💳 クレジットカード</button>
                    <button class="btn-nexo">₿ Nexo / 仮想通貨</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
