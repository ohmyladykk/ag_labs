name: Daily LINE Notification

on:
  schedule:
    # UTCの22:00は日本時間(JST)の翌午前7:00になります
    - cron: '0 22 * * *'
  # GitHub Actionsの画面から手動でテスト実行できるようにする設定
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # LTSを利用
          
      - name: Run LINE Bot Script
        env:
          # 新しいLINE Messaging APIのチャネルアクセストークン
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          # 宛先を指定するユーザーID
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node bot.js
