name: Deploy to GitHub Pages

on:
  # mainブランチに変更がPushされたときに自動実行
  push:
    branches: ["main"]
  # 手動でも実行できるようにする
  workflow_dispatch:

# GitHub Pagesにファイルを書き込むための権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時のデプロイが重ならないように制御
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. サイトのビルド（準備）作業
  build:
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4
      - name: GitHub Pagesのセットアップ
        uses: actions/configure-pages@v4
      - name: アーティファクトのアップロード（HTML/CSSをパッケージ化）
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリのルートディレクトリにあるファイルをまるごと公開
          path: '.'

  # 2. 実際のサーバーへのデプロイ（公開）作業
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
